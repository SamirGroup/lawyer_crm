<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin — LegalFlow{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">⚖️ LegalFlow</div>
    <nav>
      <a href="/admin-panel/" class="{% block nav_dash %}{% endblock %}">📊 Dashboard</a>
      <a href="/admin-panel/requests/" class="{% block nav_req %}{% endblock %}">📋 Requests</a>
      <a href="/admin-panel/lawyers/" class="{% block nav_law %}{% endblock %}">👨⚖️ Lawyers</a>
      <a href="/accounts/logout/" class="nav-logout">🚪 Logout</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-content">
      {% block content %}{% endblock %}
    </div>
  </main>
  <script src="/static/js/admin.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
