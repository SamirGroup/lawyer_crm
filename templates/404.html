{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="card" style="text-align:center;padding:3rem;">
  <h1 style="font-size:4rem;color:#e2e8f0;">404</h1>
  <h2>Page Not Found</h2>
  <p style="color:#6b7280;margin:1rem 0;">The URL you entered doesn't exist. URLs require an ID number.</p>
  <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:1rem;margin:1.5rem 0;text-align:left;display:inline-block;">
    <p style="font-size:.85rem;color:#6b7280;margin-bottom:.5rem;">Correct URL examples:</p>
    <code style="display:block;margin:.25rem 0;">/cabinet/3/</code>
    <code style="display:block;margin:.25rem 0;">/payment/2/</code>
    <code style="display:block;margin:.25rem 0;">/status/?id=1</code>
  </div>
  <br>
  <a href="/status/" class="btn btn-primary">Check Your Request Status</a>
  <a href="/" class="btn btn-secondary" style="margin-left:.5rem;">Go Home</a>
</div>
{% endblock %}
